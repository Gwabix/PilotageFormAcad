<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget de Pilotage</title>
    <link rel="stylesheet" href="widget_pilotage.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Pilotage des formations</h1>
        </div>

        <div class="tabs">
            <div class="tab active" role="tab" tabindex="0" onclick="switchTab('enseignant')"
                onKeyDown="if(event.key==='Enter'||event.key===' ')switchTab('enseignant')">Enseignant</div>
            <div class="tab" role="tab" tabindex="0" onclick="switchTab('ecole')"
                onKeyDown="if(event.key==='Enter'||event.key===' ')switchTab('ecole')">École</div>
            <div class="tab" role="tab" tabindex="0" onclick="switchTab('circonscription')"
                onKeyDown="if(event.key==='Enter'||event.key===' ')switchTab('circonscription')">Circonscription</div>
        </div>

        <div id="enseignant" class="tab-content active">
            <div class="search-section">
                <h2>Rechercher un enseignant</h2>
                <div class="search-container">
                    <div class="search-input-wrapper">
                        <input type="text" class="search-input" id="searchEnseignant"
                            placeholder="Tapez le nom ou prénom de l'enseignant..." autocomplete="off">
                        <button class="clear-search" onclick="clearSearch('enseignant')"
                            title="Effacer la recherche">×</button>
                        <div class="search-results" id="searchResultsEnseignant"></div>
                    </div>
                </div>
            </div>

            <div id="resultsEnseignant" class="results-container"></div>
        </div>

        <div id="ecole" class="tab-content">
            <div class="search-section">
                <h2>Rechercher une école</h2>
                <div class="search-container">
                    <div class="search-input-wrapper">
                        <input type="text" class="search-input" id="searchEcole"
                            placeholder="Tapez le nom de l'école ou de la commune..." autocomplete="off">
                        <button class="clear-search" onclick="clearSearch('ecole')"
                            title="Effacer la recherche">×</button>
                        <div class="search-results" id="searchResultsEcole"></div>
                    </div>
                </div>
            </div>

            <div id="resultsEcole" class="results-container"></div>
        </div>

        <div id="circonscription" class="tab-content">
            <div class="search-section">
                <h2>Rechercher une circonscription</h2>
                <div class="search-container">
                    <div class="search-input-wrapper">
                        <input type="text" class="search-input" id="searchCirconscription"
                            placeholder="Tapez le nom de la circonscription..." autocomplete="off">
                        <button class="clear-search" onclick="clearSearch('circonscription')"
                            title="Effacer la recherche">×</button>
                        <div class="search-results" id="searchResultsCirconscription"></div>
                    </div>
                </div>
            </div>

            <div id="resultsCirconscription" class="results-container"></div>
        </div>
    </div>

    <!-- Bouton flottant retour en haut -->
    <button id="scrollTopBtn" title="Retour en haut">↑</button>

    <!-- Bibliothèques pour génération PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
    <script src="pilotage.js"></script>
</body>

</html>
