<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilotage académique – Formation continue</title>
    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
    <link rel="stylesheet" href="widget_pilotage_academique.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Pilotage académique de la formation continue</h1>
        </div>

        <div class="tabs">
            <button class="tab active" id="tabDepartement" data-tab="departement">Département</button>
            <button class="tab" id="tabAcademie" data-tab="academie">Académie</button>
        </div>

        <div id="departement" class="tab-content active">
            <div class="search-section">
                <h2>Sélectionner un département</h2>
                <div id="radioDepartementsContainer" class="radio-container">
                    <!-- Les boutons radio seront générés dynamiquement par JavaScript -->
                </div>
            </div>
            <div id="resultsDepartement" class="results-container"></div>
        </div>

        <div id="academie" class="tab-content">
            <div id="resultsAcademie" class="results-container"></div>
        </div>
    </div>

    <button id="scrollTopBtn" title="Retour en haut">↑</button>

    <!-- Bibliothèques pour génération PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script src="pilotage_academique.js"></script>
</body>

</html>
